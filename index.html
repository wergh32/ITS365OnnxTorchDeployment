<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intel Scene Classifier</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>Intel Scene Classifier</h1>
    <p>Select a sample Intel scene image or upload your own.</p>

    <div class="controls">
      <label for="categorySelect">Choose a scene category:</label>
      <select id="categorySelect">
        <option value="buildings">buildings</option>
        <option value="forest">forest</option>
        <option value="glacier">glacier</option>
        <option value="mountain">mountain</option>
        <option value="sea">sea</option>
        <option value="street">street</option>
      </select>
      <button id="loadSamplesBtn">Load Sample Images</button>
    </div>

    <div id="sampleGallery" class="gallery"></div>

    <hr>

    <div class="upload-section">
      <label for="imageUpload">Or upload your own image:</label>
      <input type="file" id="imageUpload" accept="image/*" />
    </div>

    <div class="preview-section">
      <h3>Selected Image</h3>
      <img id="preview" alt="Selected preview" />
    </div>

    <button id="predictBtn">Predict</button>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
